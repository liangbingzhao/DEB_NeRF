exp:
  expname: walnut_20kev_60kev_50_singlefield_lh10
  expdir: /ibex/project/c2272/liangbing/cs300_project/experiments/res_256/v3_dual_phys_singlefield/
  datadir: ./data/res_256/v3_dual_phys/walnut_20kev_60kev_50.pickle
network:
  net_type: Lineformer_singlefield
  num_layers: 4
  hidden_dim: 32
  skips: [2]
  out_dim: 1
  last_activation: sigmoid
  bound: 0.3
  line_size: 2
  dim_head: 4
  heads: 8
  num_blocks: 1
encoder:
  encoding: hashgrid
  input_dim: 3
  num_levels: 16
  level_dim: 2
  base_resolution: 16
  log2_hashmap_size: 19
render:
  n_samples: 256
  n_fine: 0
  perturb: True
  raw_noise_std: 0.
  netchunk: 409600
train:
  epoch: 1500
  n_batch: 1
  n_rays: 1024
  lrate: 0.001
  lrate_gamma: 0.1
  lrate_step: 1500
  resume: False
  window_size: [8, 8]
  window_num: 16
loss:
  lambda_recon_low: 1.0
  lambda_recon_high: 10.0
physics:
  # ρ ∈ [0,1] aligned with image_low normalization (image_low_max = 1.0).
  # kappa_high = μ_water_60 / μ_water_20 = 0.2059 / 0.8096 = 0.25432
  kappa_low: 1.0
  kappa_high: 0.25432312253951085
log:
  i_eval: 250
  i_save: 500
