exp:
  expname: walnut_20kev_60kev_25_singlefield_flip60
  expdir: /ibex/project/c2272/liangbing/cs300_project/experiments/res_256/v3_dual_phys_singlefield_25view/
  datadir: ./data/res_256/v3_dual_phys/walnut_20kev_60kev_25.pickle
network:
  net_type: Lineformer_singlefield
  num_layers: 4
  hidden_dim: 32
  skips: [2]
  out_dim: 1
  last_activation: sigmoid
  bound: 0.3
  line_size: 2
  dim_head: 4
  heads: 8
  num_blocks: 1
encoder:
  encoding: hashgrid
  input_dim: 3
  num_levels: 16
  level_dim: 2
  base_resolution: 16
  log2_hashmap_size: 19
render:
  n_samples: 256
  n_fine: 0
  perturb: True
  raw_noise_std: 0.
  netchunk: 409600
train:
  epoch: 1500
  n_batch: 1
  n_rays: 1024
  lrate: 0.001
  lrate_gamma: 0.1
  lrate_step: 1500
  resume: False
  window_size: [8, 8]
  window_num: 16
loss:
  lambda_recon_low: 1.0
  lambda_recon_high: 1.0
physics:
  # Flipped alignment: ρ aligned to 60keV scale (instead of 20keV)
  # image_high pre-rescaled by 7.87 ≈ 1/image_high_max so it spans [0,1]
  # κ_low=0.5 means pred_image_low = ρ × 0.5 ∈ [0, 0.5] (image_low > 0.5 voxels will underfit — mirror of 50keV penalty in original Path B)
  # κ_high=1.0 means pred_image_high_rescaled = ρ × 1.0 ∈ [0, 1] (full sigmoid range)
  kappa_low: 0.5
  kappa_high: 1.0
  high_rescale: 7.87401574803  # = 1 / 0.127 (≈ 1/image_high_max)
log:
  i_eval: 250
  i_save: 500
